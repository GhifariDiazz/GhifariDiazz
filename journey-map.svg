<svg viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="ocean" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#101d33"/>
      <stop offset="100%" stop-color="#070c17"/>
    </radialGradient>
    <radialGradient id="islandFoundation" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3a4f6b"/>
      <stop offset="100%" stop-color="#1d2b40"/>
    </radialGradient>
    <radialGradient id="islandStorm" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#4a3d6b"/>
      <stop offset="100%" stop-color="#221c3a"/>
    </radialGradient>
    <radialGradient id="islandData" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#204a52"/>
      <stop offset="100%" stop-color="#122c33"/>
    </radialGradient>
    <radialGradient id="islandFort" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#5c4726"/>
      <stop offset="100%" stop-color="#2e2410"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1400" height="520" fill="url(#ocean)"/>

  <!-- faint current lines across the ocean -->
  <g stroke="#1c2a42" stroke-width="1" fill="none" opacity="0.6">
    <path d="M0,80 C 300,60 600,100 1400,70"/>
    <path d="M0,440 C 300,470 700,420 1400,460"/>
    <path d="M0,250 C 400,230 900,270 1400,240"/>
  </g>

  <!-- route: traveled (solid amber) -->
  <path d="M150,330 C 230,260 300,180 390,190 C 470,198 520,300 640,320 C 740,336 830,220 930,195"
        stroke="#d9a441" stroke-width="2.5" fill="none" stroke-dasharray="1 10" stroke-linecap="round"/>

  <!-- route: unexplored (faint violet, sparse dash) -->
  <path d="M930,195 C 1020,175 1120,240 1220,300"
        stroke="#6f6aa8" stroke-width="2" fill="none" stroke-dasharray="1 14" stroke-linecap="round" opacity="0.7"/>

  <!-- compass rose -->
  <g transform="translate(1300,70)" stroke="#8fa3c0" fill="none" stroke-width="1.2" opacity="0.85">
    <circle r="34"/>
    <circle r="2" fill="#8fa3c0" stroke="none"/>
    <line x1="0" y1="-34" x2="0" y2="34"/>
    <line x1="-34" y1="0" x2="34" y2="0"/>
    <path d="M0,-34 L6,-10 L0,-16 L-6,-10 Z" fill="#d9a441" stroke="none"/>
    <text x="0" y="-42" text-anchor="middle" fill="#8fa3c0" font-size="12" font-family="monospace">N</text>
  </g>

  <!-- ============ ISLAND 1 — Pulau Firma ============ -->
  <g transform="translate(150,330)">
    <ellipse cx="0" cy="30" rx="70" ry="14" fill="#050a14" opacity="0.5" filter="url(#soft)"/>
    <path d="M-60,10 C -50,-30 -10,-45 20,-30 C 55,-15 55,15 30,25 C 0,38 -45,32 -60,10 Z" fill="url(#islandFoundation)" stroke="#4a5f7c" stroke-width="1"/>
    <!-- flag -->
    <line x1="10" y1="-30" x2="10" y2="-62" stroke="#c9d4e2" stroke-width="1.5"/>
    <path d="M10,-62 L34,-54 L10,-46 Z" fill="#d9a441"/>
    <text x="0" y="60" text-anchor="middle" fill="#d7deea" font-size="17" font-weight="bold">Pulau Firma</text>
    <text x="0" y="80" text-anchor="middle" fill="#7d8ba3" font-size="11" font-family="monospace">chapter 01</text>
  </g>

  <!-- ============ ISLAND 2 — Selat Asinkron ============ -->
  <g transform="translate(390,190)">
    <ellipse cx="0" cy="30" rx="75" ry="14" fill="#050a14" opacity="0.5" filter="url(#soft)"/>
    <path d="M-65,15 L-40,-40 L-15,-10 L10,-48 L35,-5 L60,20 L20,40 L-30,38 Z" fill="url(#islandStorm)" stroke="#5c4f8c" stroke-width="1"/>
    <line x1="-15" y1="-10" x2="-15" y2="-40" stroke="#c9d4e2" stroke-width="1.5"/>
    <path d="M-15,-40 L9,-32 L-15,-24 Z" fill="#8f7fe0"/>
    <text x="0" y="62" text-anchor="middle" fill="#d7deea" font-size="17" font-weight="bold">Selat Asinkron</text>
    <text x="0" y="82" text-anchor="middle" fill="#7d8ba3" font-size="11" font-family="monospace">chapter 02</text>
  </g>

  <!-- ============ ISLAND 3 — Kepulauan Klaster ============ -->
  <g transform="translate(640,320)">
    <ellipse cx="0" cy="30" rx="72" ry="14" fill="#050a14" opacity="0.5" filter="url(#soft)"/>
    <path d="M-55,15 C -50,-25 -10,-40 25,-25 C 55,-12 50,20 20,30 C -10,40 -50,35 -55,15 Z" fill="url(#islandData)" stroke="#3d7a83" stroke-width="1"/>
    <circle cx="-15" cy="-5" r="4" fill="#4fd6e8"/>
    <circle cx="0" cy="-15" r="4" fill="#4fd6e8"/>
    <circle cx="15" cy="-2" r="4" fill="#8f7fe0"/>
    <circle cx="-2" cy="5" r="3" fill="#4fd6e8"/>
    <line x1="0" y1="-15" x2="0" y2="-48" stroke="#c9d4e2" stroke-width="1.5"/>
    <path d="M0,-48 L24,-40 L0,-32 Z" fill="#4fd6e8"/>
    <text x="0" y="60" text-anchor="middle" fill="#d7deea" font-size="17" font-weight="bold">Kepulauan Klaster</text>
    <text x="0" y="80" text-anchor="middle" fill="#7d8ba3" font-size="11" font-family="monospace">chapter 03</text>
  </g>

  <!-- ============ ISLAND 4 — Benteng Kerta (current) ============ -->
  <g transform="translate(930,195)">
    <ellipse cx="0" cy="32" rx="85" ry="15" fill="#050a14" opacity="0.5" filter="url(#soft)"/>
    <path d="M-70,15 C -65,-35 -15,-52 25,-38 C 65,-24 65,15 35,28 C 0,42 -55,38 -70,15 Z" fill="url(#islandFort)" stroke="#8c6f36" stroke-width="1"/>
    <!-- fortress towers -->
    <rect x="-10" y="-58" width="14" height="22" fill="#8c6f36"/>
    <polygon points="-10,-58 -3,-70 4,-58" fill="#d9a441"/>
    <rect x="14" y="-48" width="10" height="16" fill="#8c6f36"/>
    <!-- flag -->
    <line x1="-3" y1="-70" x2="-3" y2="-96" stroke="#c9d4e2" stroke-width="1.5"/>
    <path d="M-3,-96 L21,-88 L-3,-80 Z" fill="#d9a441"/>
    <text x="0" y="62" text-anchor="middle" fill="#f1e6cf" font-size="18" font-weight="bold">Benteng Kerta</text>
    <text x="0" y="82" text-anchor="middle" fill="#c2a668" font-size="11" font-family="monospace">chapter 04 — you are here</text>
    <!-- ship marker -->
    <g transform="translate(-100,55)">
      <path d="M-16,0 L16,0 L10,12 L-10,12 Z" fill="#e3ddc9" stroke="#8fa3c0" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#c9d4e2" stroke-width="1.5"/>
      <path d="M0,-22 L16,-14 L0,-6 Z" fill="#e3ddc9"/>
    </g>
  </g>

  <!-- ============ ISLAND 5 — Cakrawala Next (unlanded / horizon) ============ -->
  <g transform="translate(1220,300)" opacity="0.55">
    <path d="M-50,10 C -45,-20 -10,-32 20,-20 C 45,-10 42,15 15,22 C -15,30 -45,26 -50,10 Z"
          fill="none" stroke="#6f6aa8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="0" y="55" text-anchor="middle" fill="#8f89c4" font-size="15" font-style="italic">Cakrawala Next</text>
    <text x="0" y="73" text-anchor="middle" fill="#5f5c86" font-size="10" font-family="monospace">uncharted — next voyage</text>
  </g>

</svg>
